<script src="/js/config.js"></script>
<script src="/js/session.js"></script>
<script src="/js/logger.js"></script>
<script src="/js/sheets.js"></script>
<script src="/js/security.js"></script>
<script src="/js/auth.js"></script>

<script>

let pendingFile=null;
let pendingFileType=null;
let currentUser=null;
let confirmedCount=0;

function linkify(text){

const escaped=text
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;");

return escaped.replace(/\S+/g,token=>{

if(/^https?:\/\//i.test(token)){

return "<a href=\""+token+"\" target=\"_blank\" rel=\"noopener\">"+token+"</a>";

}

const dotIndex=token.indexOf(".");

if(dotIndex>0&&dotIndex<token.length-1&&/^[^\s]+\.[^\s]+$/.test(token)){

const href="https://"+token;

return "<a href=\""+href+"\" target=\"_blank\" rel=\"noopener\">"+token+"</a>";

}

return token;

});

}

function buildMessageBubble(msg){

const bubble=document.createElement("div");
bubble.className="chatMessage";

const sender=document.createElement("div");
sender.className="sender";
sender.textContent=msg.username+" ("+CONFIG.ROLE_NAMES[msg.role]+"):";
bubble.appendChild(sender);

if(msg.message){

const text=document.createElement("div");
text.className="text";
text.innerHTML=linkify(msg.message);
bubble.appendChild(text);

}

if(msg.attachmentUrl){

if(msg.attachmentType==="video"){

if(msg.attachmentUrl.indexOf("blob:")===0){

const video=document.createElement("video");
video.src=msg.attachmentUrl;
video.controls=true;
bubble.appendChild(video);

}else{

const link=document.createElement("a");
link.href=msg.attachmentUrl;
link.target="_blank";
link.rel="noopener";
link.className="videoLink";
link.textContent="▶ Watch video";
bubble.appendChild(link);

}

}else{

const img=document.createElement("img");
img.src=msg.attachmentUrl;

img.addEventListener("load",()=>{

const container=document.getElementById("chatMessages");
container.scrollTop=container.scrollHeight;

});

bubble.appendChild(img);

}

}

return bubble;

}

function appendMessage(msg){

const container=document.getElementById("chatMessages");
const bubble=buildMessageBubble(msg);
container.appendChild(bubble);
container.scrollTop=container.scrollHeight;
return bubble;

}

function renderInitialMessages(messages){

const container=document.getElementById("chatMessages");
container.innerHTML="";

messages.forEach(msg=>{

container.appendChild(buildMessageBubble(msg));

});

container.scrollTop=container.scrollHeight;
confirmedCount=messages.length;

setTimeout(()=>{

container.scrollTop=container.scrollHeight;

},100);

}

async function pollMessages(){

const result=await Sheets.getMessages();

if(!result.success)return;

if(result.messages.length>confirmedCount){

result.messages.slice(confirmedCount).forEach(appendMessage);
confirmedCount=result.messages.length;

}

}

window.addEventListener("load",async()=>{

const loading=document.getElementById("loading");

const result=await Sheets.loadChat();

if(!result.success){

SessionManager.destroy();
window.location.replace(CONFIG.ROUTES.LOGIN);
return;

}

currentUser=result.user;

renderInitialMessages(result.messages);

if(new URLSearchParams(window.location.search).get("dm")==="1"){

setDmView(true);

}

loading.classList.add("hidden");

setInterval(pollMessages,5000);

});

document.getElementById("navHome").addEventListener("click",()=>{

window.location.href=CONFIG.ROUTES.HOME;

});

document.getElementById("navChat").addEventListener("click",()=>{

window.location.href=CONFIG.ROUTES.CHAT;

});

document.getElementById("navCompetition").addEventListener("click",()=>{

window.location.href=CONFIG.ROUTES.COMPETITIONS;

});

function playGame(game){

Sheets.log("GAME_CLICK",game.name);

if(game.internal){

window.location.href="/"+game.url.replace(/^\/+/,"");

}else{

window.open(game.url,"_blank");

}

}

let gamesLoaded=false;

async function ensureGamesLoaded(){

if(gamesLoaded)return;

const result=await Sheets.getGames();

if(!result.success)return;

gamesLoaded=true;

const list=document.getElementById("gamesDropdownList");
list.innerHTML="";

result.games.forEach(game=>{

const button=document.createElement("button");
button.className=game.internal?"pill pill-internal":"pill pill-blue";
button.textContent=game.name;

button.addEventListener("click",(e)=>{

e.stopPropagation();
playGame(game);

});

list.appendChild(button);

});

}

const gamesDropdown=document.getElementById("gamesDropdown");

document.getElementById("navGames").addEventListener("click",async(e)=>{

e.stopPropagation();
navMenu.classList.remove("open");

if(!gamesDropdown.classList.contains("open")){

await ensureGamesLoaded();

}

gamesDropdown.classList.toggle("open");

});

gamesDropdown.addEventListener("click",(e)=>{

e.stopPropagation();

});

let inDmView=false;

function setDmView(open){

inDmView=open;

document.getElementById("gcView").classList.toggle("hidden",open);
document.getElementById("dmsView").classList.toggle("hidden",!open);
document.getElementById("viewTitle").textContent=open?"DMs":"Chat";
document.getElementById("dmToggleButton").textContent=open?"GC":"DMs";

if(open){

showDmList();
loadDmsList();

}

}

document.getElementById("dmToggleButton").addEventListener("click",()=>{

setDmView(!inDmView);

});

const navMenu=document.getElementById("navMenu");
const menuButton=document.getElementById("menuButton");

menuButton.addEventListener("click",(e)=>{

e.stopPropagation();
gamesDropdown.classList.remove("open");
navMenu.classList.toggle("open");

});

const attachMenu=document.getElementById("attachMenu");
const attachButton=document.getElementById("attachButton");

attachButton.addEventListener("click",(e)=>{

e.stopPropagation();
attachMenu.classList.toggle("open");

});

document.addEventListener("click",()=>{

navMenu.classList.remove("open");
attachMenu.classList.remove("open");
gamesDropdown.classList.remove("open");

});

const fileInput=document.getElementById("fileInput");

document.getElementById("attachFileItem").addEventListener("click",()=>{

attachMenu.classList.remove("open");
fileInput.click();

});

fileInput.addEventListener("change",()=>{

const file=fileInput.files[0];
if(!file)return;

pendingFile=file;
pendingFileType=file.type.indexOf("video/")===0?"video":"image";

const previewBox=document.getElementById("attachPreview");
const previewImage=document.getElementById("previewImage");
const previewVideo=document.getElementById("previewVideo");

const url=URL.createObjectURL(file);

if(pendingFileType==="video"){

previewVideo.src=url;
previewVideo.classList.remove("hidden");
previewImage.classList.add("hidden");

}else{

previewImage.src=url;
previewImage.classList.remove("hidden");
previewVideo.classList.add("hidden");

}

previewBox.classList.remove("hidden");

});

document.getElementById("removeAttachmentButton").addEventListener("click",()=>{

pendingFile=null;
pendingFileType=null;
fileInput.value="";
document.getElementById("attachPreview").classList.add("hidden");

});

function fileToBase64(file){

return new Promise((resolve,reject)=>{

const reader=new FileReader();

reader.onload=()=>resolve(reader.result.split(",")[1]);
reader.onerror=reject;

reader.readAsDataURL(file);

});

}

async function handleSend(){

const input=document.getElementById("chatInput");
const text=input.value.trim();

if(!text&&!pendingFile)return;

const fileToSend=pendingFile;
const fileTypeHint=pendingFileType;

input.value="";
pendingFile=null;
pendingFileType=null;
fileInput.value="";
document.getElementById("attachPreview").classList.add("hidden");

let optimisticAttachmentUrl="";
let optimisticAttachmentType="";

if(fileToSend){

optimisticAttachmentUrl=URL.createObjectURL(fileToSend);
optimisticAttachmentType=fileTypeHint;

}

const bubble=appendMessage({
username:currentUser.username,
role:currentUser.role,
message:text,
attachmentUrl:optimisticAttachmentUrl,
attachmentType:optimisticAttachmentType
});

confirmedCount++;

let statusTag=null;

if(fileToSend){

statusTag=document.createElement("div");
statusTag.className="uploadStatus";
statusTag.textContent=fileTypeHint==="video"?"Uploading video...":"Uploading...";
bubble.appendChild(statusTag);

}

let attachmentUrl="";
let attachmentType="";

if(fileToSend){

const base64Data=await fileToBase64(fileToSend);

const uploadResult=await Sheets.uploadAttachment(
fileToSend.name,
fileToSend.type,
base64Data
);

if(uploadResult.success){

attachmentUrl=uploadResult.url;
attachmentType=uploadResult.type;

if(statusTag)statusTag.remove();

}else{

if(statusTag){

statusTag.textContent="Failed to send";
statusTag.classList.add("failed");

}

}

}

if(text||attachmentUrl){

await Sheets.sendMessage(text,attachmentUrl,attachmentType);

}

}

document.getElementById("sendButton").addEventListener("click",handleSend);

document.getElementById("chatInput").addEventListener("keydown",e=>{

if(e.key==="Enter"){

handleSend();

}

});

let dmMethod="number";
let openContactId=null;
let dmPendingFile=null;
let dmPollInterval=null;

function showDmList(){

document.getElementById("dmsListView").classList.remove("hidden");
document.getElementById("dmThreadView").classList.add("hidden");

if(dmPollInterval){

clearInterval(dmPollInterval);
dmPollInterval=null;

}

openContactId=null;

}

document.getElementById("dmMethodNumber").addEventListener("click",()=>{

dmMethod="number";
document.getElementById("dmMethodNumber").classList.add("active");
document.getElementById("dmMethodUsername").classList.remove("active");
document.getElementById("dmIdentifierInput").placeholder="6-digit school number";

});

document.getElementById("dmMethodUsername").addEventListener("click",()=>{

dmMethod="username";
document.getElementById("dmMethodUsername").classList.add("active");
document.getElementById("dmMethodNumber").classList.remove("active");
document.getElementById("dmIdentifierInput").placeholder="Username";

});

document.getElementById("dmAddButton").addEventListener("click",async()=>{

const input=document.getElementById("dmIdentifierInput");
const value=input.value.trim();

if(!value)return;

const statusBox=document.getElementById("dmStatusMessage");
statusBox.textContent="Sending...";

const result=await Sheets.sendDmRequest(dmMethod,value);

statusBox.textContent=result.message||(result.success?"Done.":"Something went wrong.");

if(result.success){

input.value="";

}

loadDmsList();

});

async function loadDmsList(){

const loading=document.getElementById("loading");
loading.classList.remove("hidden");

const result=await Sheets.loadDms();

loading.classList.add("hidden");

if(!result.success)return;

const requestsList=document.getElementById("dmRequestsList");
requestsList.innerHTML="";

result.requests.forEach(req=>{

const row=document.createElement("div");
row.className="dmRequestRow";

const label=document.createElement("span");
label.textContent=req.display+" wants to DM you";
row.appendChild(label);

const acceptBtn=document.createElement("button");
acceptBtn.className="button create small";
acceptBtn.textContent="Accept";
acceptBtn.addEventListener("click",async()=>{

if(acceptBtn.disabled)return;

acceptBtn.disabled=true;
declineBtn.disabled=true;

await Sheets.respondDmRequest(req.requestId,true);
loadDmsList();

});
row.appendChild(acceptBtn);

const declineBtn=document.createElement("button");
declineBtn.className="button guest";
declineBtn.textContent="Decline";
declineBtn.addEventListener("click",async()=>{

if(declineBtn.disabled)return;

acceptBtn.disabled=true;
declineBtn.disabled=true;

await Sheets.respondDmRequest(req.requestId,false);
loadDmsList();

});
row.appendChild(declineBtn);

requestsList.appendChild(row);

});

const contactsList=document.getElementById("dmContactsList");
contactsList.innerHTML="";

result.contacts.forEach(contact=>{

const row=document.createElement("button");
row.className="dmContactRow";

let text=contact.display;
if(contact.revealedExtra)text+=" ("+contact.revealedExtra+")";

row.textContent=text;

row.addEventListener("click",()=>{

openDmThread(contact);

});

contactsList.appendChild(row);

});

}

function openDmThread(contact){

openContactId=contact.contactId;
dmConfirmedCount=0;
document.getElementById("dmMessages").innerHTML="";

document.getElementById("dmsListView").classList.add("hidden");
document.getElementById("dmThreadView").classList.remove("hidden");

let title=contact.display;
if(contact.revealedExtra)title+=" ("+contact.revealedExtra+")";
document.getElementById("dmThreadTitle").textContent=title;

const shareButton=document.getElementById("dmShareButton");

if(contact.shareConsented){

shareButton.textContent="Shared";
shareButton.disabled=true;

}else if(contact.myConsent){

shareButton.textContent="Waiting for them";
shareButton.disabled=true;

}else{

shareButton.textContent=contact.method==="number"?"Share username":"Share number";
shareButton.disabled=false;

}

loadDmMessages();

if(dmPollInterval)clearInterval(dmPollInterval);
dmPollInterval=setInterval(loadDmMessages,5000);

}

document.getElementById("dmBackButton").addEventListener("click",()=>{

showDmList();
loadDmsList();

});

document.getElementById("dmShareButton").addEventListener("click",async()=>{

if(!openContactId)return;

await Sheets.requestShareIdentity(openContactId);

const result=await Sheets.loadDms();

if(result.success){

const updated=result.contacts.find(c=>c.contactId===openContactId);
if(updated)openDmThread(updated);

}

});

function buildDmBubble(msg){

const bubble=document.createElement("div");
bubble.className="chatMessage"+(msg.fromMe?" dmMine":"");

if(msg.message){

const text=document.createElement("div");
text.className="text";
text.innerHTML=linkify(msg.message);
bubble.appendChild(text);

}

if(msg.attachmentUrl){

const img=document.createElement("img");
img.src=msg.attachmentUrl;

img.addEventListener("load",()=>{

const container=document.getElementById("dmMessages");
container.scrollTop=container.scrollHeight;

});

bubble.appendChild(img);

}

return bubble;

}

let dmConfirmedCount=0;

async function loadDmMessages(){

if(!openContactId)return;

const result=await Sheets.getDmMessages(openContactId);

if(!result.success)return;

if(result.messages.length<=dmConfirmedCount)return;

const container=document.getElementById("dmMessages");

result.messages.slice(dmConfirmedCount).forEach(msg=>{

container.appendChild(buildDmBubble(msg));

});

dmConfirmedCount=result.messages.length;

container.scrollTop=container.scrollHeight;

setTimeout(()=>{

container.scrollTop=container.scrollHeight;

},100);

}

document.getElementById("dmAttachButton").addEventListener("click",()=>{

document.getElementById("dmFileInput").click();

});

document.getElementById("dmFileInput").addEventListener("change",()=>{

const file=document.getElementById("dmFileInput").files[0];
if(!file)return;

dmPendingFile=file;

const previewBox=document.getElementById("dmAttachPreview");
const previewImage=document.getElementById("dmPreviewImage");

previewImage.src=URL.createObjectURL(file);
previewBox.classList.remove("hidden");

});

document.getElementById("dmRemoveAttachmentButton").addEventListener("click",()=>{

dmPendingFile=null;
document.getElementById("dmFileInput").value="";
document.getElementById("dmAttachPreview").classList.add("hidden");

});

async function handleDmSend(){

if(!openContactId)return;

const input=document.getElementById("dmInput");
const text=input.value.trim();

if(!text&&!dmPendingFile)return;

const fileToSend=dmPendingFile;

input.value="";
dmPendingFile=null;
document.getElementById("dmFileInput").value="";
document.getElementById("dmAttachPreview").classList.add("hidden");

const contactId=openContactId;

const bubble=buildDmBubble({
fromMe:true,
message:text,
attachmentUrl:fileToSend?URL.createObjectURL(fileToSend):""
});

document.getElementById("dmMessages").appendChild(bubble);
document.getElementById("dmMessages").scrollTop=document.getElementById("dmMessages").scrollHeight;

let attachmentUrl="";
let attachmentType="";

if(fileToSend){

const base64Data=await fileToBase64(fileToSend);

const uploadResult=await Sheets.uploadAttachment(
fileToSend.name,
fileToSend.type,
base64Data,
"dm"
);

if(uploadResult.success){

attachmentUrl=uploadResult.url;
attachmentType=uploadResult.type;

}

}

if(text||attachmentUrl){

await Sheets.sendDmMessage(contactId,text,attachmentUrl,attachmentType);

}

}

document.getElementById("dmSendButton").addEventListener("click",handleDmSend);

document.getElementById("dmInput").addEventListener("keydown",e=>{

if(e.key==="Enter"){

handleDmSend();

}

});

</script>

</body>

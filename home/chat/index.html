<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Chat</title>

<link rel="stylesheet" href="/css/animations.css">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/home.css">

</head>
<body>

<div class="loading" id="loading">
<div class="spinner"></div>
</div>

<div class="dashboard">

<header class="topbar">

<div class="title">
Chat
</div>

<div class="userArea">

<div class="navMenu" id="navMenu">

<button class="menuButton" id="menuButton" aria-label="Menu">
☰
</button>

<div class="navItems">

<button class="navItem chat" id="navChat" aria-label="Chat">
💬
</button>

<button class="navItem home" id="navHome" aria-label="Home">
🏠
</button>

<button class="navItem competition" id="navCompetition" aria-label="Competitions">
🏆
</button>

</div>

</div>

</div>

</header>

<div class="chatArea">

<div class="chatMessages" id="chatMessages">

</div>

<div class="slowModeLabel">
Slow Mode Is On
</div>

<div class="chatInputBar">

<button class="attachButton" id="attachButton" aria-label="Attach">
＋
</button>

<div class="attachMenu" id="attachMenu">

<button class="attachMenuItem" id="attachFileItem">
📎 Attach File
</button>

<button class="attachMenuItem disabled" disabled>
🖼 Meme Library (Coming soon)
</button>

</div>

<input type="file" id="fileInput" accept="image/*,video/*" hidden>

<div class="attachPreview hidden" id="attachPreview">

<img id="previewImage" class="hidden">
<video id="previewVideo" class="hidden" muted></video>

<button id="removeAttachmentButton">✕</button>

</div>

<input type="text" class="chatInput" id="chatInput" placeholder="Type Here...">

<button class="sendButton" id="sendButton">
Send
</button>

</div>

</div>

</div>

<script src="/js/config.js"></script>
<script src="/js/session.js"></script>
<script src="/js/logger.js"></script>
<script src="/js/sheets.js"></script>
<script src="/js/security.js"></script>
<script src="/js/auth.js"></script>

<script>

let pendingFile=null;
let pendingFileType=null;
let currentUser=null;
let confirmedCount=0;

function linkify(text){

const escaped=text
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;");

return escaped.replace(/\S+/g,token=>{

if(/^https?:\/\//i.test(token)){

return "<a href=\""+token+"\" target=\"_blank\" rel=\"noopener\">"+token+"</a>";

}

const dotIndex=token.indexOf(".");

if(dotIndex>0&&dotIndex<token.length-1&&/^[^\s]+\.[^\s]+$/.test(token)){

const href="https://"+token;

return "<a href=\""+href+"\" target=\"_blank\" rel=\"noopener\">"+token+"</a>";

}

return token;

});

}

function buildMessageBubble(msg){

const bubble=document.createElement("div");
bubble.className="chatMessage";

const sender=document.createElement("div");
sender.className="sender";
sender.textContent=msg.username+" ("+CONFIG.ROLE_NAMES[msg.role]+"):";
bubble.appendChild(sender);

if(msg.message){

const text=document.createElement("div");
text.className="text";
text.innerHTML=linkify(msg.message);
bubble.appendChild(text);

}

if(msg.attachmentUrl){

if(msg.attachmentType==="video"){

const video=document.createElement("video");
video.src=msg.attachmentUrl;
video.controls=true;
bubble.appendChild(video);

}else{

const img=document.createElement("img");
img.src=msg.attachmentUrl;
bubble.appendChild(img);

}

}

return bubble;

}

function appendMessage(msg){

const container=document.getElementById("chatMessages");
container.appendChild(buildMessageBubble(msg));
container.scrollTop=container.scrollHeight;

}

function renderInitialMessages(messages){

const container=document.getElementById("chatMessages");
container.innerHTML="";

messages.forEach(msg=>{

container.appendChild(buildMessageBubble(msg));

});

container.scrollTop=container.scrollHeight;
confirmedCount=messages.length;

}

async function pollMessages(){

const result=await Sheets.getMessages();

if(!result.success)return;

if(result.messages.length>confirmedCount){

result.messages.slice(confirmedCount).forEach(appendMessage);
confirmedCount=result.messages.length;

}

}

window.addEventListener("load",async()=>{

const loading=document.getElementById("loading");

const result=await Sheets.loadChat();

if(!result.success){

SessionManager.destroy();
window.location.replace(CONFIG.ROUTES.LOGIN);
return;

}

currentUser=result.user;

renderInitialMessages(result.messages);

loading.classList.add("hidden");

setInterval(pollMessages,5000);

});

document.getElementById("navHome").addEventListener("click",()=>{

window.location.href=CONFIG.ROUTES.HOME;

});

document.getElementById("navChat").addEventListener("click",()=>{

window.location.href=CONFIG.ROUTES.CHAT;

});

document.getElementById("navCompetition").addEventListener("click",()=>{

window.location.href=CONFIG.ROUTES.COMPETITIONS;

});

const navMenu=document.getElementById("navMenu");
const menuButton=document.getElementById("menuButton");

menuButton.addEventListener("click",(e)=>{

e.stopPropagation();
navMenu.classList.toggle("open");

});

const attachMenu=document.getElementById("attachMenu");
const attachButton=document.getElementById("attachButton");

attachButton.addEventListener("click",(e)=>{

e.stopPropagation();
attachMenu.classList.toggle("open");

});

document.addEventListener("click",()=>{

navMenu.classList.remove("open");
attachMenu.classList.remove("open");

});

const fileInput=document.getElementById("fileInput");

document.getElementById("attachFileItem").addEventListener("click",()=>{

attachMenu.classList.remove("open");
fileInput.click();

});

fileInput.addEventListener("change",()=>{

const file=fileInput.files[0];
if(!file)return;

pendingFile=file;
pendingFileType=file.type.indexOf("video/")===0?"video":"image";

const previewBox=document.getElementById("attachPreview");
const previewImage=document.getElementById("previewImage");
const previewVideo=document.getElementById("previewVideo");

const url=URL.createObjectURL(file);

if(pendingFileType==="video"){

previewVideo.src=url;
previewVideo.classList.remove("hidden");
previewImage.classList.add("hidden");

}else{

previewImage.src=url;
previewImage.classList.remove("hidden");
previewVideo.classList.add("hidden");

}

previewBox.classList.remove("hidden");

});

document.getElementById("removeAttachmentButton").addEventListener("click",()=>{

pendingFile=null;
pendingFileType=null;
fileInput.value="";
document.getElementById("attachPreview").classList.add("hidden");

});

function fileToBase64(file){

return new Promise((resolve,reject)=>{

const reader=new FileReader();

reader.onload=()=>resolve(reader.result.split(",")[1]);
reader.onerror=reject;

reader.readAsDataURL(file);

});

}

async function handleSend(){

const input=document.getElementById("chatInput");
const text=input.value.trim();

if(!text&&!pendingFile)return;

const fileToSend=pendingFile;
const fileTypeHint=pendingFileType;

input.value="";
pendingFile=null;
pendingFileType=null;
fileInput.value="";
document.getElementById("attachPreview").classList.add("hidden");

let optimisticAttachmentUrl="";
let optimisticAttachmentType="";

if(fileToSend){

optimisticAttachmentUrl=URL.createObjectURL(fileToSend);
optimisticAttachmentType=fileTypeHint;

}

appendMessage({
username:currentUser.username,
role:currentUser.role,
message:text,
attachmentUrl:optimisticAttachmentUrl,
attachmentType:optimisticAttachmentType
});

confirmedCount++;

let attachmentUrl="";
let attachmentType="";

if(fileToSend){

const base64Data=await fileToBase64(fileToSend);

const uploadResult=await Sheets.uploadAttachment(
fileToSend.name,
fileToSend.type,
base64Data
);

if(uploadResult.success){

attachmentUrl=uploadResult.url;
attachmentType=uploadResult.type;

}else{

alert("Attachment failed to upload: "+(uploadResult.message||"unknown error"));

}

}

if(text||attachmentUrl){

await Sheets.sendMessage(text,attachmentUrl,attachmentType);

}

}

document.getElementById("sendButton").addEventListener("click",handleSend);

document.getElementById("chatInput").addEventListener("keydown",e=>{

if(e.key==="Enter"){

handleSend();

}

});

</script>

</body>
</html>

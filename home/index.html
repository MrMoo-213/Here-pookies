<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Home</title>
<script src="/js/sparx.js"></script>
<link rel="stylesheet" href="/css/animations.css">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/home.css">

</head>
<body>

<div class="loading hidden" id="loading">
<div class="spinner"></div>
</div>

<div class="toast" id="toast">
<span class="tick">✓</span>
<span id="toastText">Name updated</span>
</div>

<div class="dashboard">

<header class="topbar">

<div class="title">
Here pookies 😘💕
</div>

<div class="userArea">

<div class="navMenu" id="navMenu">

<div class="navItems">

<button class="navItem chat" id="navChat" aria-label="Chat">
💬
</button>

<button class="navItem home" id="navHome" aria-label="Home">
🏠
</button>

<button class="navItem competition" id="navCompetition" aria-label="Competitions">
🏆
</button>

<button class="navItem games" id="navGames" aria-label="Games">
🎮
</button>

</div>

<div class="gamesDropdown" id="gamesDropdown">

<div class="gamesList" id="gamesDropdownList"></div>

</div>

</div>

</div>

</header>

<main class="home-main">

<button class="pill pill-green" id="competitionsButton">
Competitions
</button>

<button class="pill pill-yellow" id="appsButton">
Games
</button>

<button class="pill pill-blue" id="chatButton">
Chat
</button>

<button class="changeNameButton" id="changeNameButton">
Change Name
</button>

</main>

</div>

<button class="gearButton" id="gearButton" aria-label="Settings">
⚙
</button>

<div class="settingsPanel hidden" id="settingsPanel">

<h2>Account</h2>

<p><strong>Email:</strong> <span id="email">Loading...</span></p>
<p><strong>Role:</strong> <span id="role">Loading...</span></p>

<button class="button guest" id="logoutButton">
Logout
</button>

</div>

<div class="settingsPanel hidden" id="changeNamePanel">

<h2>Change Name</h2>

<label for="newUsernameInput">New Username:</label>
<input type="text" id="newUsernameInput" placeholder="3-20 characters">

<button class="button create small" id="submitNameButton">
Submit
</button>

</div>

<div class="settingsOverlay hidden" id="settingsOverlay"></div>

<script src="/js/config.js"></script>
<script src="/js/session.js"></script>
<script src="/js/logger.js"></script>
<script src="/js/sheets.js"></script>
<script src="/js/security.js"></script>
<script src="/js/auth.js"></script>

<script>

window.addEventListener("load",async()=>{

const loading=document.getElementById("loading");

const allowed=await Security.protect();

if(!allowed)return;

const user=await Security.getUser();

if(!user)return;

document.getElementById("email").textContent=user.email;
document.getElementById("role").textContent=CONFIG.ROLE_NAMES[user.role];

const changeNameButton=document.getElementById("changeNameButton");

if(user.username==="Username"){

changeNameButton.classList.add("attention");

}

loading.classList.add("hidden");

const dmResult=await Sheets.loadDms();

if(dmResult.success&&dmResult.requests&&dmResult.requests.length>0){

showToast("You have a pending DM request!");

}

});

document.getElementById("logoutButton").addEventListener("click",()=>{

Auth.logout();

});

document.getElementById("competitionsButton").addEventListener("click",()=>{

window.location.href=CONFIG.ROUTES.COMPETITIONS;

});

document.getElementById("appsButton").addEventListener("click",()=>{

window.location.href="/home/apps";

});

document.getElementById("chatButton").addEventListener("click",()=>{

window.location.href=CONFIG.ROUTES.CHAT;

});

document.getElementById("navChat").addEventListener("click",()=>{

window.location.href=CONFIG.ROUTES.CHAT;

});

document.getElementById("navHome").addEventListener("click",()=>{

window.location.href=CONFIG.ROUTES.HOME;

});

document.getElementById("navCompetition").addEventListener("click",()=>{

window.location.href=CONFIG.ROUTES.COMPETITIONS;

});

let gamesLoaded=false;
const gamesDropdown=document.getElementById("gamesDropdown");

async function ensureGamesLoaded(){

if(gamesLoaded)return;

const result=await Sheets.getGames();

if(!result.success)return;

gamesLoaded=true;

const list=document.getElementById("gamesDropdownList");
list.innerHTML="";

result.games.forEach(game=>{

const button=document.createElement("button");
button.className=game.internal?"pill pill-internal":"pill pill-blue";
button.textContent=game.name;

button.addEventListener("click",(e)=>{

e.stopPropagation();

Sheets.log("GAME_CLICK",game.name);

if(game.internal){

window.location.href="/"+game.url.replace(/^\/+/,"");

}else{

window.open(game.url,"_blank");

}

});

list.appendChild(button);

});

}

document.getElementById("navGames").addEventListener("click",async(e)=>{

e.stopPropagation();

if(!gamesDropdown.classList.contains("open")){

await ensureGamesLoaded();

}

gamesDropdown.classList.toggle("open");

});

gamesDropdown.addEventListener("click",(e)=>{

e.stopPropagation();

});

document.addEventListener("click",()=>{

gamesDropdown.classList.remove("open");

});

const gearButton=document.getElementById("gearButton");
const settingsPanel=document.getElementById("settingsPanel");
const changeNamePanel=document.getElementById("changeNamePanel");
const settingsOverlay=document.getElementById("settingsOverlay");

function closeAllPanels(){

settingsPanel.classList.add("hidden");
changeNamePanel.classList.add("hidden");
settingsOverlay.classList.add("hidden");

}

function openSettings(){

if(!settingsPanel.classList.contains("hidden")){

closeAllPanels();
return;

}

closeAllPanels();
settingsPanel.classList.remove("hidden");
settingsOverlay.classList.remove("hidden");

}

function openChangeName(){

if(!changeNamePanel.classList.contains("hidden")){

closeAllPanels();
return;

}

closeAllPanels();
changeNamePanel.classList.remove("hidden");
settingsOverlay.classList.remove("hidden");

}

gearButton.addEventListener("click",openSettings);
document.getElementById("changeNameButton").addEventListener("click",openChangeName);
settingsOverlay.addEventListener("click",closeAllPanels);

function showToast(message){

const toast=document.getElementById("toast");
document.getElementById("toastText").textContent=message;

toast.classList.add("show");

setTimeout(()=>{

toast.classList.remove("show");

},3000);

}

document.getElementById("submitNameButton").addEventListener("click",async()=>{

const input=document.getElementById("newUsernameInput");
const newUsername=input.value.trim();

if(!newUsername)return;

const loading=document.getElementById("loading");
loading.classList.remove("hidden");

const result=await Sheets.changeUsername(newUsername);

loading.classList.add("hidden");

if(!result.success){

showToast(result.message||"Couldn't update name.");
return;

}

document.getElementById("username").textContent=result.username;
document.getElementById("changeNameButton").classList.remove("attention");
input.value="";

closeAllPanels();

showToast("Name updated");

});

</script>

</body>
</html>

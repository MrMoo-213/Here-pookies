<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Home</title>

<link rel="stylesheet" href="/css/animations.css">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/home.css">

</head>
<body>

<div class="loading hidden" id="loading">
<div class="spinner"></div>
</div>

<div class="toast" id="toast">
<span class="tick">✓</span>
<span id="toastText">Name updated</span>
</div>

<div class="dashboard">

<header class="topbar">

<div class="title">
Here pookies 😘💕
</div>

<div class="userArea">

<div class="welcome">
Welcome,
<span id="username">Loading...</span>
</div>

<button class="changeNameButton" id="changeNameButton">
Change Name
</button>

</div>

</header>

<main class="home-main">

<button class="pill pill-green" id="competitionsButton">
Competitions
</button>

<button class="pill pill-yellow" id="appsButton">
Games
</button>

<button class="pill pill-blue" id="chatButton">
Chat
</button>

</main>

</div>

<button class="gearButton" id="gearButton" aria-label="Settings">
⚙
</button>

<div class="settingsPanel hidden" id="settingsPanel">

<h2>Account</h2>

<p><strong>Email:</strong> <span id="email">Loading...</span></p>
<p><strong>Role:</strong> <span id="role">Loading...</span></p>

<button class="button guest" id="logoutButton">
Logout
</button>

</div>

<div class="settingsPanel hidden" id="changeNamePanel">

<h2>Change Name</h2>

<label for="newUsernameInput">New Username:</label>
<input type="text" id="newUsernameInput" placeholder="3-20 characters">

<button class="button create small" id="submitNameButton">
Submit
</button>

</div>

<div class="settingsOverlay hidden" id="settingsOverlay"></div>

<script src="/js/config.js"></script>
<script src="/js/session.js"></script>
<script src="/js/logger.js"></script>
<script src="/js/sheets.js"></script>
<script src="/js/security.js"></script>
<script src="/js/auth.js"></script>

<script>

window.addEventListener("load",async()=>{

const loading=document.getElementById("loading");

const allowed=await Security.protect();

if(!allowed)return;

const user=await Security.getUser();

if(!user)return;

document.getElementById("username").textContent=user.username;
document.getElementById("email").textContent=user.email;
document.getElementById("role").textContent=CONFIG.ROLE_NAMES[user.role];

const changeNameButton=document.getElementById("changeNameButton");

if(user.username==="Username"){

changeNameButton.classList.add("attention");

}

loading.classList.add("hidden");

});

document.getElementById("logoutButton").addEventListener("click",()=>{

Auth.logout();

});

document.getElementById("competitionsButton").addEventListener("click",()=>{

window.location.href=CONFIG.ROUTES.COMPETITIONS;

});

document.getElementById("appsButton").addEventListener("click",()=>{

window.location.href="/home/apps";

});

document.getElementById("chatButton").addEventListener("click",()=>{

window.location.href=CONFIG.ROUTES.CHAT;

});

const gearButton=document.getElementById("gearButton");
const settingsPanel=document.getElementById("settingsPanel");
const changeNamePanel=document.getElementById("changeNamePanel");
const settingsOverlay=document.getElementById("settingsOverlay");

function closeAllPanels(){

settingsPanel.classList.add("hidden");
changeNamePanel.classList.add("hidden");
settingsOverlay.classList.add("hidden");

}

function openSettings(){

if(!settingsPanel.classList.contains("hidden")){

closeAllPanels();
return;

}

closeAllPanels();
settingsPanel.classList.remove("hidden");
settingsOverlay.classList.remove("hidden");

}

function openChangeName(){

if(!changeNamePanel.classList.contains("hidden")){

closeAllPanels();
return;

}

closeAllPanels();
changeNamePanel.classList.remove("hidden");
settingsOverlay.classList.remove("hidden");

}

gearButton.addEventListener("click",openSettings);
document.getElementById("changeNameButton").addEventListener("click",openChangeName);
settingsOverlay.addEventListener("click",closeAllPanels);

function showToast(message){

const toast=document.getElementById("toast");
document.getElementById("toastText").textContent=message;

toast.classList.add("show");

setTimeout(()=>{

toast.classList.remove("show");

},3000);

}

document.getElementById("submitNameButton").addEventListener("click",async()=>{

const input=document.getElementById("newUsernameInput");
const newUsername=input.value.trim();

if(!newUsername)return;

const result=await Sheets.changeUsername(newUsername);

if(!result.success){

showToast(result.message||"Couldn't update name.");
return;

}

document.getElementById("username").textContent=result.username;
document.getElementById("changeNameButton").classList.remove("attention");
input.value="";

closeAllPanels();

showToast("Name updated");

});

</script>

</body>
</html>

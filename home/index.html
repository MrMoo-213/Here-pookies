<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Home</title>

<link rel="stylesheet" href="/css/animations.css">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/home.css">

</head>
<body>

<div class="loading hidden" id="loading">
<div class="spinner"></div>
</div>

<div class="dashboard">

<header class="topbar">

<div class="title">
Here pookies 😘💕
</div>

<div class="userArea">

<div class="welcome">
Welcome,
<span id="username">Loading...</span>
</div>

</div>

</header>

<main class="home-main">

<button class="pill pill-green" id="competitionsButton">
Competitions
</button>

<button class="pill pill-yellow" id="appsButton">
Games
</button>

<button class="pill pill-blue" id="chatButton">
Chat
</button>

</main>

</div>

<button class="gearButton" id="gearButton" aria-label="Settings">
⚙
</button>

<div class="settingsPanel hidden" id="settingsPanel">

<h2>Account</h2>

<p><strong>Email:</strong> <span id="email">Loading...</span></p>
<p><strong>Role:</strong> <span id="role">Loading...</span></p>

<button class="button guest" id="logoutButton">
Logout
</button>

</div>

<div class="settingsOverlay hidden" id="settingsOverlay"></div>

<script src="/js/config.js"></script>
<script src="/js/session.js"></script>
<script src="/js/logger.js"></script>
<script src="/js/sheets.js"></script>
<script src="/js/security.js"></script>
<script src="/js/auth.js"></script>

<script>

window.addEventListener("load",async()=>{

const loading=document.getElementById("loading");

const allowed=await Security.protect();

if(!allowed)return;

const user=await Security.getUser();

if(!user)return;

document.getElementById("username").textContent=user.username;
document.getElementById("email").textContent=user.email;
document.getElementById("role").textContent=CONFIG.ROLE_NAMES[user.role];

loading.classList.add("hidden");

});

document.getElementById("logoutButton").addEventListener("click",()=>{

Auth.logout();

});

document.getElementById("competitionsButton").addEventListener("click",()=>{

alert("Competitions is coming soon.");

});

document.getElementById("appsButton").addEventListener("click",()=>{

window.location.href="/home/apps";

});

document.getElementById("chatButton").addEventListener("click",()=>{

alert("Chat is coming soon.");

});

const gearButton=document.getElementById("gearButton");
const settingsPanel=document.getElementById("settingsPanel");
const settingsOverlay=document.getElementById("settingsOverlay");

function toggleSettings(){

settingsPanel.classList.toggle("hidden");
settingsOverlay.classList.toggle("hidden");

}

gearButton.addEventListener("click",toggleSettings);
settingsOverlay.addEventListener("click",toggleSettings);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<script src="/js/sparx.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Games</title>

<link rel="stylesheet" href="/css/animations.css">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/home.css">

</head>
<body>

<div class="loading" id="loading">
<div class="spinner"></div>
</div>

<div class="toast" id="toast">
<span class="tick">✓</span>
<span id="toastText">Successfully Requested</span>
</div>

<div class="dashboard">

<header class="topbar">

<div class="title">
Games
</div>

<div class="userArea">

<div class="navMenu" id="navMenu">

<button class="menuButton" id="menuButton" aria-label="Menu">
☰
</button>

<div class="navItems">

<button class="navItem chat" id="navChat" aria-label="Chat">
💬
</button>

<button class="navItem home" id="navHome" aria-label="Home">
🏠
</button>

<button class="navItem competition" id="navCompetition" aria-label="Competitions">
🏆
</button>

<button class="navItem dms" id="navDms" aria-label="DMs">
💬
</button>

<button class="navItem games" id="navGames" aria-label="Games">
🎮
</button>

</div>

</div>

</div>

</header>

<main class="apps-grid" id="appsGrid">

</main>

</div>

<div class="iconStack">

<button class="iconBtn" id="layoutButton" aria-label="Toggle layout">
<svg viewBox="0 0 36 20" width="24" height="14">
<rect x="1" y="1" width="34" height="18" rx="9" fill="none" stroke="currentColor" stroke-width="2"/>
<circle cx="10" cy="10" r="6" fill="currentColor"/>
</svg>
</button>

<button class="iconBtn" id="addButton" aria-label="Add game">
＋
</button>

<button class="iconBtn" id="meetButton" aria-label="Join the google meet">
📽
</button>
  
<button class="iconBtn" id="gearButton" aria-label="Settings">
⚙
</button>

</div>

<div class="settingsPanel hidden" id="settingsPanel">

<h2>Account</h2>

<p><strong>Email:</strong> <span id="email">Loading...</span></p>
<p><strong>Role:</strong> <span id="role">Loading...</span></p>

<button class="button guest" id="logoutButton">
Logout
</button>

</div>

<div class="settingsPanel hidden" id="addPanel">

<h2>New Game</h2>

<label for="gameNameInput">Game Name:</label>
<input type="text" id="gameNameInput" placeholder="e.g. Minecraft">

<label for="gameUrlInput">URL:</label>
<label for="gameUrlInput">(If you want me to find it put google.com)</label>
<input type="text" id="gameUrlInput" placeholder="google.com/super-leng">

<button class="button create small" id="submitGameButton">
Submit
</button>

</div>

  <div class="settingsPanel hidden" id="meetPanel">

<h2>Join the google meet!</h2>
<button class="button create small" id="meetTutorialButton">
Tutorial
</button>
<button class="button create small" id="copyMeetButton">Copy URL</button>
  
<div class="settingsOverlay hidden" id="settingsOverlay"></div>

<script src="/js/config.js"></script>
<script src="/js/session.js"></script>
<script src="/js/logger.js"></script>
<script src="/js/sheets.js"></script>
<script src="/js/security.js"></script>
<script src="/js/auth.js"></script>

<script>

function showToast(message){

const toast=document.getElementById("toast");
document.getElementById("toastText").textContent=message;

toast.classList.add("show");

setTimeout(()=>{

toast.classList.remove("show");

},3000);

}

function renderGames(games){

const grid=document.getElementById("appsGrid");
grid.innerHTML="";

games.forEach(game=>{

const button=document.createElement("button");
button.className=game.internal?"pill pill-internal":"pill pill-blue";
button.textContent=game.name;

button.addEventListener("click",()=>{

Sheets.log("GAME_CLICK",game.name);

if(game.internal){

window.location.href="/"+game.url.replace(/^\/+/,"");

}else{

window.open(game.url,"_blank");

}

});

grid.appendChild(button);

});

}

window.addEventListener("load",async()=>{

const loading=document.getElementById("loading");

const result=await Sheets.loadApps();

if(!result.success){

SessionManager.destroy();
window.location.replace(CONFIG.ROUTES.LOGIN);
return;

}

document.getElementById("email").textContent=result.user.email;
document.getElementById("role").textContent=CONFIG.ROLE_NAMES[result.user.role];

renderGames(result.games);

SessionManager.startWatcher();
Logger.page(window.location.pathname);

loading.classList.add("hidden");

});

document.getElementById("navHome").addEventListener("click",()=>{

window.location.href=CONFIG.ROUTES.HOME;

});

document.getElementById("navChat").addEventListener("click",()=>{

window.location.href=CONFIG.ROUTES.CHAT;

});

document.getElementById("navCompetition").addEventListener("click",()=>{

window.location.href=CONFIG.ROUTES.COMPETITIONS;

});

document.getElementById("navDms").addEventListener("click",()=>{

window.location.href=CONFIG.ROUTES.CHAT+"?dm=1";

});

document.getElementById("navGames").addEventListener("click",()=>{

window.location.href="/home/apps";

});

const navMenu=document.getElementById("navMenu");
const menuButton=document.getElementById("menuButton");

menuButton.addEventListener("click",(e)=>{

e.stopPropagation();
navMenu.classList.toggle("open");

});

document.addEventListener("click",()=>{

navMenu.classList.remove("open");

});

document.getElementById("layoutButton").addEventListener("click",()=>{

document.getElementById("appsGrid").classList.toggle("list-view");

});

document.getElementById("logoutButton").addEventListener("click",()=>{

Auth.logout();

});

const gearButton=document.getElementById("gearButton");
const settingsPanel=document.getElementById("settingsPanel");
const addPanel=document.getElementById("addPanel");
const settingsOverlay=document.getElementById("settingsOverlay");

function closeAllPanels(){

    settingsPanel.classList.add("hidden");
    addPanel.classList.add("hidden");
    meetPanel.classList.add("hidden");
    settingsOverlay.classList.add("hidden");

}

function openSettings(){

if(!settingsPanel.classList.contains("hidden")){

closeAllPanels();
return;

}

closeAllPanels();
settingsPanel.classList.remove("hidden");
settingsOverlay.classList.remove("hidden");

}

function openAddPanel(){

    if(!addPanel.classList.contains("hidden")){

        closeAllPanels();
        return;

    }

    closeAllPanels();
    addPanel.classList.remove("hidden");
    settingsOverlay.classList.remove("hidden");

}

const meetPanel=document.getElementById("meetPanel");

function openMeetPanel(){

    if(!meetPanel.classList.contains("hidden")){

        closeAllPanels();
        return;

    }

    closeAllPanels();
    meetPanel.classList.remove("hidden");
    settingsOverlay.classList.remove("hidden");

}

gearButton.addEventListener("click",openSettings);

document.getElementById("addButton").addEventListener("click",openAddPanel);
document.getElementById("meetButton").addEventListener("click",openMeetPanel);
settingsOverlay.addEventListener("click",closeAllPanels);
  
document.getElementById("submitGameButton").addEventListener("click",async()=>{

const nameInput=document.getElementById("gameNameInput");
const urlInput=document.getElementById("gameUrlInput");

const name=nameInput.value.trim();
const url=urlInput.value.trim();

if(!name||!url)return;

await Sheets.requestGame(name,url);

nameInput.value="";
urlInput.value="";

addPanel.classList.add("hidden");
settingsOverlay.classList.add("hidden");

showToast("Successfully Requested");

});

document.getElementById("meetTutorialButton").addEventListener("click",()=>{
    window.open("https://docs.google.com/presentation/d/17Bv9zCH0hi_nTUzyD3i_zP05FV90vkFnvIYRJOkZpwc/","_blank");
});
document.getElementById("copyMeetButton").addEventListener("click",()=>{
    navigator.clipboard.writeText("https://meet.google.com/wvq-daos-hos");
});
</script>

</body>
</html>

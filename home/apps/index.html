<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Games</title>

<link rel="stylesheet" href="/css/animations.css">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/home.css">

</head>
<body>

<div class="loading hidden" id="loading">
<div class="spinner"></div>
</div>

<div class="dashboard">

<header class="topbar">

<div class="title">
Games
</div>

<div class="userArea">

<button class="button guest" id="backButton">
Back
</button>

</div>

</header>

<main class="home-main">

<button class="pill pill-blue" id="geometryDashButton">
Geometry Dash
</button>

<button class="pill pill-blue" id="mergeFellasButton">
Merge Fellas
</button>

<button class="pill pill-blue" id="mergeFruitsButton">
Merge Fruits
</button>

</main>

</div>

<script src="/js/config.js"></script>
<script src="/js/session.js"></script>
<script src="/js/logger.js"></script>
<script src="/js/sheets.js"></script>
<script src="/js/security.js"></script>
<script src="/js/auth.js"></script>

<script>

window.addEventListener("load",async()=>{

const loading=document.getElementById("loading");

const allowed=await Security.protect();

if(!allowed)return;

loading.classList.add("hidden");

});

document.getElementById("backButton").addEventListener("click",()=>{

window.location.href=CONFIG.ROUTES.HOME;

});

document.getElementById("geometryDashButton").addEventListener("click",()=>{

window.location.href="/home/apps/geometry-dash";

});

document.getElementById("mergeFellasButton").addEventListener("click",()=>{

window.location.href="/home/apps/merge-fellas";

});

document.getElementById("mergeFruitsButton").addEventListener("click",()=>{

window.location.href="/home/apps/merge-fruits";

});

</script>

</body>
</html>

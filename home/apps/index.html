<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Apps</title>

<link rel="stylesheet" href="/css/animations.css">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/home.css">

</head>
<body>

<div class="loading hidden" id="loading">
<div class="spinner"></div>
</div>

<div class="dashboard">

<header class="topbar">

<div class="title">
Apps
</div>

<div class="userArea">

<button class="menuButton" id="homeButton" aria-label="Home">
☰
</button>

</div>

</header>

<main class="apps-grid" id="appsGrid">

<button class="pill pill-blue" id="geometryDashButton">
Geometry Dash
</button>

<button class="pill pill-blue" id="mergeFellasButton">
Merge Fellas
</button>

<button class="pill pill-blue" id="mergeFruitsButton">
Merge Fruits
</button>

</main>

</div>

<div class="iconStack">

<button class="iconBtn" id="layoutButton" aria-label="Toggle layout">
📖
</button>

<button class="iconBtn" id="addButton" aria-label="Add app">
＋
</button>

<button class="iconBtn" id="gearButton" aria-label="Settings">
⚙
</button>

</div>

<div class="settingsPanel hidden" id="settingsPanel">

<h2>Account</h2>

<p><strong>Email:</strong> <span id="email">Loading...</span></p>
<p><strong>Role:</strong> <span id="role">Loading...</span></p>

<button class="button guest" id="logoutButton">
Logout
</button>

</div>

<div class="settingsOverlay hidden" id="settingsOverlay"></div>

<script src="/js/config.js"></script>
<script src="/js/session.js"></script>
<script src="/js/logger.js"></script>
<script src="/js/sheets.js"></script>
<script src="/js/security.js"></script>
<script src="/js/auth.js"></script>

<script>

window.addEventListener("load",async()=>{

const loading=document.getElementById("loading");

const allowed=await Security.protect();

if(!allowed)return;

const user=await Security.getUser();

if(user){

document.getElementById("email").textContent=user.email;
document.getElementById("role").textContent=CONFIG.ROLE_NAMES[user.role];

}

loading.classList.add("hidden");

});

document.getElementById("homeButton").addEventListener("click",()=>{

window.location.href=CONFIG.ROUTES.HOME;

});

document.getElementById("geometryDashButton").addEventListener("click",()=>{

window.location.href="/home/apps/geometry-dash";

});

document.getElementById("mergeFellasButton").addEventListener("click",()=>{

window.location.href="/home/apps/merge-fellas";

});

document.getElementById("mergeFruitsButton").addEventListener("click",()=>{

window.location.href="/home/apps/merge-fruits";

});

document.getElementById("addButton").addEventListener("click",()=>{

alert("Adding new apps is coming soon.");

});

document.getElementById("layoutButton").addEventListener("click",()=>{

document.getElementById("appsGrid").classList.toggle("list-view");

});

document.getElementById("logoutButton").addEventListener("click",()=>{

Auth.logout();

});

const gearButton=document.getElementById("gearButton");
const settingsPanel=document.getElementById("settingsPanel");
const settingsOverlay=document.getElementById("settingsOverlay");

function toggleSettings(){

settingsPanel.classList.toggle("hidden");
settingsOverlay.classList.toggle("hidden");

}

gearButton.addEventListener("click",toggleSettings);
settingsOverlay.addEventListener("click",toggleSettings);

</script>

</body>
</html>

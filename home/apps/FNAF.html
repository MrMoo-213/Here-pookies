<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="stylesheet" href="/css/animations.css">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/home.css">
<script src="/js/sparx.js"></script>
</head>
<body>

<div class="loading hidden" id="loading">
<div class="spinner"></div>
</div>

<div class="dashboard">

<header class="topbar">

<div class="title">
FNAF
</div>

<div class="userArea">

<div class="navMenu" id="navMenu">

<div class="navItems">

<button class="navItem chat" id="navChat" aria-label="Chat">
💬
</button>

<button class="navItem home" id="navHome" aria-label="Home">
🏠
</button>

<button class="navItem competition" id="navCompetition" aria-label="Competitions">
🏆
</button>

<button class="navItem games" id="navGames" aria-label="Games">
🎮
</button>

</div>

<div class="gamesDropdown" id="gamesDropdown">

<div class="gamesList" id="gamesDropdownList"></div>

</div>

</div>

</div>

</header>

<main class="apps-grid" id="appsGrid">

<button class="pill pill-blue" data-url="https://irv77.github.io/hd_fnaf/1/">
FNAF 1
</button>

<button class="pill pill-blue" data-url="https://irv77.github.io/hd_fnaf/2/">
FNAF 2
</button>

<button class="pill pill-blue" data-url="https://irv77.github.io/hd_fnaf/3/">
FNAF 3
</button>

<button class="pill pill-blue" data-url="https://irv77.github.io/hd_fnaf/4/">
FNAF 4
</button>

<button class="pill pill-blue" data-url="https://irv77.github.io/hd_fnaf/w/">
FNAF World
</button>

<button class="pill pill-blue" data-url="https://irv77.github.io/hd_fnaf/sl/">
FNAF Sister Location
</button>

<button class="pill pill-blue" data-url="https://irv77.github.io/hd_fnaf/ps/">
FNAF Pizzeria Simulator
</button>

<button class="pill pill-blue" data-url="https://irv77.github.io/hd_fnaf/ucn/">
FNAF UCN
</button>

</main>

</div>

<div class="iconStack">

<button class="iconBtn" id="gearButton" aria-label="Settings">
⚙
</button>

</div>

<div class="settingsPanel hidden" id="settingsPanel">

<h2>Account</h2>

<p><strong>Email:</strong> <span id="email">Loading...</span></p>
<p><strong>Role:</strong> <span id="role">Loading...</span></p>

<button class="button guest" id="logoutButton">
Logout
</button>

</div>

<div class="settingsOverlay hidden" id="settingsOverlay"></div>

<script src="/js/config.js"></script>
<script src="/js/session.js"></script>
<script src="/js/logger.js"></script>
<script src="/js/sheets.js"></script>
<script src="/js/security.js"></script>
<script src="/js/auth.js"></script>

<script>

window.addEventListener("load",async()=>{

const loading=document.getElementById("loading");

const allowed=await Security.protect();

if(!allowed)return;

const user=await Security.getUser();

if(user){

document.getElementById("email").textContent=user.email;
document.getElementById("role").textContent=CONFIG.ROLE_NAMES[user.role];

}

loading.classList.add("hidden");

});

document.querySelectorAll("#appsGrid .pill").forEach(button=>{

button.addEventListener("click",()=>{

Sheets.log("GAME_CLICK",button.textContent.trim());

window.open(button.dataset.url,"_blank");

});

});

document.getElementById("navHome").addEventListener("click",()=>{

window.location.href=CONFIG.ROUTES.HOME;

});

document.getElementById("navChat").addEventListener("click",()=>{

window.location.href=CONFIG.ROUTES.CHAT;

});

document.getElementById("navCompetition").addEventListener("click",()=>{

window.location.href=CONFIG.ROUTES.COMPETITIONS;

});

function playGame(game){

Sheets.log("GAME_CLICK",game.name);

if(game.internal){

window.location.href="/"+game.url.replace(/^\/+/,"");

}else{

window.open(game.url,"_blank");

}

}

let gamesLoaded=false;

async function ensureGamesLoaded(){

if(gamesLoaded)return;

const result=await Sheets.getGames();

if(!result.success)return;

gamesLoaded=true;

const list=document.getElementById("gamesDropdownList");
list.innerHTML="";

result.games.forEach(game=>{

const button=document.createElement("button");
button.className=game.internal?"pill pill-internal":"pill pill-blue";
button.textContent=game.name;

button.addEventListener("click",(e)=>{

e.stopPropagation();
playGame(game);

});

list.appendChild(button);

});

}

const gamesDropdown=document.getElementById("gamesDropdown");

document.getElementById("navGames").addEventListener("click",async(e)=>{

e.stopPropagation();

if(!gamesDropdown.classList.contains("open")){

await ensureGamesLoaded();

}

gamesDropdown.classList.toggle("open");

});

gamesDropdown.addEventListener("click",(e)=>{

e.stopPropagation();

});

document.addEventListener("click",()=>{

gamesDropdown.classList.remove("open");

});

document.getElementById("logoutButton").addEventListener("click",()=>{

Auth.logout();

});

const gearButton=document.getElementById("gearButton");
const settingsPanel=document.getElementById("settingsPanel");
const settingsOverlay=document.getElementById("settingsOverlay");

gearButton.addEventListener("click",()=>{

settingsPanel.classList.toggle("hidden");
settingsOverlay.classList.toggle("hidden");

});

settingsOverlay.addEventListener("click",()=>{

settingsPanel.classList.add("hidden");
settingsOverlay.classList.add("hidden");

});

</script>

</body>
</html>

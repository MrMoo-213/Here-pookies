<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script src="js/sparx.js"></script>
<title>Create Account</title>

<link rel="stylesheet" href="/css/animations.css">
<link rel="stylesheet" href="/css/style.css">

<script>

function initGoogleSignIn(){

if(typeof CONFIG==="undefined"||typeof google==="undefined"||typeof handleGoogleSignIn==="undefined"){

setTimeout(initGoogleSignIn,50);
return;

}

google.accounts.id.initialize({
client_id:CONFIG.CLIENT_ID,
callback:handleGoogleSignIn
});

google.accounts.id.renderButton(
document.getElementById("googleButton"),
{
theme:"outline",
size:"large",
shape:"pill",
text:"signin_with",
width:320
}
);

}

</script>

<script src="https://accounts.google.com/gsi/client" async defer onload="initGoogleSignIn()"></script>

</head>
<body>

<div class="loading hidden" id="loading">
<div class="spinner"></div>
</div>

<div class="toast" id="toast">
<span class="tick">✓</span>
<span id="toastText">Successfully Requested</span>
</div>

<div class="page">

<div class="card">

<h1 class="logo">
Here pookies 😘💕
</h1>

<p class="subtitle">
<u>Request An Account</u>
</p>

<div class="requestCard" id="stageWarning">

<p>
Do you know any of the admins?<br>
If so ask them, don't fill this out.
</p>

</div>

<div class="requestCard hidden" id="stageForm">

<p>Log in with your school account:</p>

<div id="googleButton"></div>

<div class="signedInBadge hidden" id="googleSignedIn">
<span class="tick">✓</span>
Signed in with Google
</div>

<div class="wrongDomainBadge hidden" id="wrongDomainBadge">
<span class="cross">✕</span>
Wrong Domain
</div>

<label for="usernameInput">Choose a username:</label>
<input type="text" id="usernameInput" placeholder="Enter Here">

<button class="button create small" id="submitRequestButton">
Submit
</button>

<div id="error"></div>

</div>

<div class="requestCard hidden" id="stageDone">

<p>
The admins will review your request within a week.
</p>

<button class="button create small" id="backToLoginButton">
Back to Login
</button>

</div>

<button
class="button guest"
onclick="window.location.href=CONFIG.ROUTES.LOGIN">
Back
</button>

</div>

</div>

<script src="/js/config.js"></script>
<script src="/js/session.js"></script>
<script src="/js/logger.js"></script>
<script src="/js/sheets.js"></script>

<script>

let pendingIdToken=null;

function decodeJwtPayload(token){

try{

const payload=token.split(".")[1];
const decoded=atob(payload.replace(/-/g,"+").replace(/_/g,"/"));

return JSON.parse(decoded);

}catch{

return null;

}

}

function handleGoogleSignIn(response){

const claims=decodeJwtPayload(response.credential);
const email=claims&&claims.email?claims.email.toLowerCase():"";

document.getElementById("googleButton").classList.add("hidden");

if(email.endsWith("@imberhorne.co.uk")){

pendingIdToken=response.credential;
document.getElementById("wrongDomainBadge").classList.add("hidden");
document.getElementById("googleSignedIn").classList.remove("hidden");

}else{

pendingIdToken=null;
document.getElementById("googleSignedIn").classList.add("hidden");
document.getElementById("wrongDomainBadge").classList.remove("hidden");

}

}

function showToast(message){

const toast=document.getElementById("toast");
document.getElementById("toastText").textContent=message;

toast.classList.add("show");

setTimeout(()=>{

toast.classList.remove("show");

},3000);

}

document.getElementById("submitRequestButton").addEventListener("click",async()=>{

const errorBox=document.getElementById("error");
const usernameInput=document.getElementById("usernameInput");
const username=usernameInput.value.trim();

errorBox.textContent="";

if(!pendingIdToken){

errorBox.textContent="Please sign in with Google first.";
return;

}

if(!username){

errorBox.textContent="Please choose a username.";
return;

}

const loading=document.getElementById("loading");
loading.classList.remove("hidden");

const result=await Sheets.requestAccount(pendingIdToken,username);

loading.classList.add("hidden");

if(!result.success){

errorBox.textContent=result.message||"Unable to submit request.";
return;

}

document.getElementById("stageForm").classList.add("hidden");
document.getElementById("stageDone").classList.remove("hidden");

showToast("Successfully Requested");

});

document.getElementById("backToLoginButton").addEventListener("click",()=>{

window.location.href=CONFIG.ROUTES.LOGIN;

});

window.addEventListener("load",()=>{

setTimeout(()=>{

document.getElementById("stageWarning").classList.add("hidden");
document.getElementById("stageForm").classList.remove("hidden");

},2000);

});

</script>

</body>
</html>

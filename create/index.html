<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Create Account</title>

<link rel="stylesheet" href="/css/animations.css">
<link rel="stylesheet" href="/css/style.css">

<script src="https://accounts.google.com/gsi/client" async defer></script>

</head>
<body>

<div class="loading hidden" id="loading">
<div class="spinner"></div>
</div>

<div class="page">

<div class="card">

<h1 class="logo">
Create an Account
</h1>

<p class="subtitle">
Sign in with your school Google account to request access.
</p>

<div id="googleButton"></div>

<button
class="button guest"
onclick="window.location.href=CONFIG.ROUTES.LOGIN">
Back
</button>

<div id="status"></div>

<div id="error"></div>

</div>

</div>

<script src="/js/config.js"></script>
<script src="/js/session.js"></script>
<script src="/js/logger.js"></script>
<script src="/js/sheets.js"></script>
<script src="/js/auth.js"></script>

<script>

google.accounts.id.initialize({
client_id:CONFIG.CLIENT_ID,
callback:handleRequest
});

google.accounts.id.renderButton(
document.getElementById("googleButton"),
{
theme:"outline",
size:"large",
shape:"pill",
text:"signin_with",
width:320
}
);

async function handleRequest(response){

const loading=document.getElementById("loading");

if(loading){
loading.classList.remove("hidden");
}

document.getElementById("status").textContent="Submitting request...";

const result=await Sheets.requestAccount(response.credential);

if(loading){
loading.classList.add("hidden");
}

if(result.success){

document.getElementById("status").textContent="Your request has been submitted successfully.";

document.getElementById("error").textContent="";

}else{

document.getElementById("status").textContent="";

document.getElementById("error").textContent=result.message;

}

}

</script>

</body>
</html>
